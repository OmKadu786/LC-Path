<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LCPath</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="panel">

    <!-- Header -->
    <header class="panel-header">
      <span class="logo">LC<em>Path</em></span>
      <span class="solved-count" id="solved-count"></span>
      <button class="settings-btn" id="settings-btn" title="Settings">⚙</button>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-row">
      <button class="tab active" data-tab="home">Home</button>
      <button class="tab" data-tab="chat">Chat</button>
    </nav>

    <!-- ═══ HOME TAB ═══ -->
    <div id="tab-home" class="tab-content active">
      <div class="stats-row">
        <div class="stat"><span id="stat-solved">—</span><label>solved</label></div>
        <div class="stat"><span id="stat-streak">—</span><label>streak 🔥</label></div>
        <div class="stat"><span id="stat-ratio">—</span><label>easy/med</label></div>
      </div>

      <section class="panel-section">
        <div class="sec-label" style="display: flex; justify-content: space-between; align-items: center;">
          <span>Do next</span>
          <button id="reload-recs-btn" class="icon-btn" title="Cycle recommendations" style="display:none; font-size:12px;">↻</button>
        </div>
        <div id="recommendations">
          <div class="loading">Analysing your history...</div>
        </div>
      </section>

      <section class="panel-section">
        <div class="sec-label">Learn next</div>
        <div id="learn-next">
          <div class="loading">Analysing topics...</div>
        </div>
      </section>

      <section class="panel-section">
        <div class="sec-label">Topic strength</div>
        <div id="topic-bars"></div>
      </section>
    </div>

    <!-- ═══ CHAT TAB ═══ -->
    <div id="tab-chat" class="tab-content">
      <div class="chat-context-pill" id="context-pill"></div>
      <div class="chat-messages" id="chat-messages">
        <div class="msg msg-ai">
          Hi! I know your LeetCode history. Ask me what to study next,
          explain a concept, or request a weekly plan.
        </div>
      </div>
      <div class="hint-section">
        <button id="hint-btn" class="hint-btn">💡 Hint (1/3)</button>
      </div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask anything..." rows="2"></textarea>
        <button id="chat-send">↑</button>
      </div>
    </div>

    <!-- ═══ SETUP SCREEN ═══ -->
    <div id="setup-screen" class="setup hidden">
      <div class="setup-inner">
        <h2>Welcome to LCPath</h2>
        <p>Enter your LeetCode username to get started.</p>
        <input type="text" id="input-username" placeholder="LeetCode username" />
        <button id="save-setup" class="btn-primary">Save & continue</button>
      </div>
    </div>

  </div>

  <script src="panel.js"></script>
  <script src="chat.js"></script>
</body>
</html>
